<!DOCTYPE html>
<html>

<head>

    <title>Authentication App</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.7/axios.min.js"></script>

</head>

<body>

<h1>JWT Authentication</h1>

<hr>

<h2>Signup</h2>

<input
id="signup-username"
placeholder="Username">

<br><br>

<input
id="signup-password"
type="password"
placeholder="Password">

<br><br>

<button onclick="signup()">

Signup

</button>

<hr>

<h2>Signin</h2>

<input
id="signin-username"
placeholder="Username">

<br><br>

<input
id="signin-password"
type="password"
placeholder="Password">

<br><br>

<button onclick="signin()">

Signin

</button>

<hr>

<button onclick="getProfile()">

Get Profile

</button>

<h2 id="result"></h2>

<script>

async function signup(){

    const username =
    document.getElementById(
        "signup-username"
    ).value;

    const password =
    document.getElementById(
        "signup-password"
    ).value;

    try{

        const response =
        await axios.post(
            "http://localhost:3000/signup",
            {
                username,
                password
            }
        );

        alert(response.data.message);

    }catch(err){

        alert(err.response.data.message);

    }

}


async function signin(){

    const username =
    document.getElementById(
        "signin-username"
    ).value;

    const password =
    document.getElementById(
        "signin-password"
    ).value;

    try{

        const response =
        await axios.post(
            "http://localhost:3000/signin",
            {
                username,
                password
            }
        );

        localStorage.setItem(
            "token",
            response.data.token
        );

        alert("Login Successful");

    }catch(err){

        alert(err.response.data.message);

    }

}


async function getProfile(){

    const token =
    localStorage.getItem("token");

    try{

        const response =
        await axios.get(
            "http://localhost:3000/me",
            {
                headers:{
                    token
                }
            }
        );

        document.getElementById(
            "result"
        ).innerText =
        "Welcome " +
        response.data.username;

    }catch(err){

        alert("Invalid Token");

    }

}

</script>

</body>

</html>
