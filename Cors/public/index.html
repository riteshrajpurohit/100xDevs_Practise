<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross Origin Resources Sharing</title>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.18.0/dist/axios.min.js"></script>
    <script>
        
        async function sendReq (){
            const a = document.getElementById("a").value;
            const b = document.getElementById("b").value;

          const response = await  axios.post("http://localhost:3000/sum", {
                a: a ,
                b: b 
            })
            console.log(response.data);
        }
    </script>
</head>
<body>
    <input id="a" type="number" placeholder="Value of A">
    <input id="b" type="number" placeholder="Value of B">
    <button onclick="sendReq()">FIND SUM</button>
</body>
</html>
